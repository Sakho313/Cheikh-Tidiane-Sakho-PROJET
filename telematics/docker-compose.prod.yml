# Stack de production télématique : PostgreSQL + API Express/Socket.IO + frontend nginx.
#
# Usage :
#   cp .env.production .env.prod.local        # renseigner les secrets
#   docker compose -f docker-compose.prod.yml --env-file .env.prod.local up -d --build
#
# Le service `migrate` (one-shot) applique le schéma et le seed AVANT que l'API
# ne démarre — l'image runtime de l'API ne contient pas la CLI Prisma/ts-node,
# on utilise donc le stage `build` (qui a toutes les dépendances) pour la migration.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-telematics}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in your env file}
      POSTGRES_DB: ${DB_NAME:-telematics_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-telematics} -d ${DB_NAME:-telematics_db}']
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - '5432'

  migrate:
    build:
      context: .
      target: build
    command: sh -c "npx prisma db push --skip-generate && npm run seed"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-telematics}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-telematics_db}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  api:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-telematics}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-telematics_db}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in your env file}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET in your env file}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      NODE_ENV: production
      PORT: '4000'
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-300}
      INGEST_API_KEY: ${INGEST_API_KEY:-}
      DEFAULT_SPEED_LIMIT_KMH: ${DEFAULT_SPEED_LIMIT_KMH:-90}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - '4000'

  frontend:
    build:
      context: ./frontend
      args:
        VITE_MAP_PROVIDER: ${VITE_MAP_PROVIDER:-leaflet}
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN:-}
        VITE_GOOGLE_MAPS_KEY: ${VITE_GOOGLE_MAPS_KEY:-}
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-80}:80'
    depends_on:
      - api

volumes:
  postgres_data:
