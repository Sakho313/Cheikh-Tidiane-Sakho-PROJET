name: Telematics CI

# CI dédiée au sous-projet télématique (telematics/). Ne se déclenche que
# lorsque ce dossier change, indépendamment de la CI NIS2 (ci.yml).
on:
  push:
    branches: [main, 'claude/**']
    paths:
      - 'telematics/**'
      - '.github/workflows/telematics-ci.yml'
  pull_request:
    paths:
      - 'telematics/**'
      - '.github/workflows/telematics-ci.yml'

jobs:
  backend:
    name: Backend (lint, types, tests, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: telematics
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: telematics
          POSTGRES_PASSWORD: telematics
          POSTGRES_DB: telematics_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U telematics"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://telematics:telematics@localhost:5432/telematics_test
      JWT_SECRET: ci-jwt-secret-at-least-16
      JWT_REFRESH_SECRET: ci-refresh-secret-at-least-16
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: telematics/package-lock.json
      - run: npm ci
      - run: npm run generate
      - run: npx prisma db push --skip-generate
      - run: npm run lint
      - run: npm run type-check
      - run: npm test
      - run: npm run test:integration
      - run: npm run build

  frontend:
    name: Frontend (types, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: telematics/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: telematics/frontend/package-lock.json
      - run: npm ci
      - run: npm run type-check
      - run: npm run build
