name: CI

on:
  push:
    branches: [main, claude/brave-planck-igrqml, 'feature/**']
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run type-check
      - run: npm run lint
      - run: npm run format:check

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nis2user
          POSTGRES_PASSWORD: nis2pass
          POSTGRES_DB: nis2_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://nis2user:nis2pass@localhost:5432/nis2_test
      JWT_SECRET: test-jwt-secret-key-for-ci-xxxx
      JWT_EXPIRES_IN: 1h
      JWT_REFRESH_SECRET: test-refresh-secret-key-for-ci-xx
      JWT_REFRESH_EXPIRES_IN: 7d
      NODE_ENV: test
      PORT: 3001
      CORS_ORIGIN: http://localhost:3000
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 1000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma db push
      - run: npm run test:integration

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nis2user
          POSTGRES_PASSWORD: nis2pass
          POSTGRES_DB: nis2_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://nis2user:nis2pass@localhost:5432/nis2_e2e
      JWT_SECRET: e2e-jwt-secret-at-least-32-chars-long-xx
      JWT_EXPIRES_IN: 1h
      JWT_REFRESH_SECRET: e2e-refresh-secret-at-least-32-chars-xx
      JWT_REFRESH_EXPIRES_IN: 7d
      NODE_ENV: development
      PORT: 3000
      CORS_ORIGIN: http://localhost:5173
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 10000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install backend dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Build backend
        run: npm run build
      - name: Push database schema
        run: npx prisma db push
      - name: Seed database
        run: npm run seed
      - name: Start backend in background
        run: node dist/server.js &
      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend..."
          until curl -sf http://localhost:3000/health; do sleep 1; done
          echo "Backend is ready"
        timeout-minutes: 1
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend
      - name: Run E2E tests
        run: npx playwright test
        working-directory: frontend
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: sao-nis2-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: sao-nis2-frontend:${{ github.sha }}

  # ── Deploy (main branch only) ─────────────────────────────────────────────
