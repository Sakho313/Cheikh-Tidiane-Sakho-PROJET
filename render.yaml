## Render.com deployment blueprint  —  100% free plan (test)
## Docs: https://render.com/docs/blueprint-spec
##
## Creates three free resources:
##   - PostgreSQL database (nis2-db)          plan: free    (databases accept "free")
##   - Backend API web service (nis2-api)     plan: starter (free tier for web services)
##   - Frontend static site  (nis2-frontend)  toujours gratuit, pas de plan à définir
##
## Usage:
##   1. Push this repo to GitHub.
##   2. In Render: New + → "Blueprint" → select this repository.
##   3. Render reads this file and asks you to fill the `sync: false` env vars
##      on nis2-api: JWT_SECRET, JWT_REFRESH_SECRET, ADMIN_PASSWORD, OFFICER_PASSWORD.
##      Everything else (incl. the frontend's API URL) is set automatically.
##
## On every deploy the API runs `prisma db push` (creates/updates the schema)
## and the idempotent seed (NIS2 controls + admin user), so the DB is ready on
## first boot. The admin password comes from ADMIN_PASSWORD — the default demo
## password is NOT used online.

databases:
  - name: nis2-db
    databaseName: nis2_db
    user: nis2user
    plan: free
    region: frankfurt

services:
  # ── Backend API (native Node runtime, free) ──────────────────────────────────
  - type: web
    name: nis2-api
    runtime: node
    plan: starter          # "starter" = niveau gratuit pour les web services Render
    region: frankfurt      # doit correspondre à la région de la base de données
    healthCheckPath: /health
    # --include=dev keeps the prisma CLI + ts-node available for db push & seed.
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    # Bootstrap the schema and seed (both idempotent), then start the server.
    startCommand: npx prisma db push --skip-generate && npm run seed && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nis2-db
          property: connectionString   # injected automatically, leave blank
      - key: JWT_SECRET
        sync: false                     # ⟵ paste a strong random value in Render
      - key: JWT_REFRESH_SECRET
        sync: false                     # ⟵ paste a different strong random value
      - key: ADMIN_PASSWORD
        sync: false                     # ⟵ password for admin@nis2.example.com
      - key: OFFICER_PASSWORD
        sync: false                     # ⟵ (optional) password for the officer demo account
      # Shared read-only demo account (the "Accéder à la démonstration" button).
      # Public by design; must match the frontend's VITE_DEMO_* below.
      - key: DEMO_EMAIL
        value: demo@sao-nis2.com
      - key: DEMO_PASSWORD
        value: Demo2024NIS2!
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        # Frontend origin allowed to call the API cross-origin. The backend also
        # accepts any *.onrender.com origin for convenience; set this to your
        # exact frontend URL (and tighten the code) for production.
        value: https://nis2-frontend.onrender.com
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX
        value: 100

  # ── Frontend (static site) ────────────────────────────────────────────────────
  # Static sites are always free on Render — no plan field needed.
  - type: web
    name: nis2-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    # No VITE_API_BASE_URL here on purpose: the app falls back to the relative
    # `/api/v1` path, which the rewrite below proxies to the backend server-side
    # (browser stays same-origin → no CORS). Set VITE_API_BASE_URL only if you
    # drop the proxy and call the backend cross-origin.
    envVars:
      # Credentials for the demo access. Inlined at build time.
      # Must match DEMO_EMAIL / DEMO_PASSWORD on the API service above.
      - key: VITE_DEMO_EMAIL
        value: demo@sao-nis2.com
      - key: VITE_DEMO_PASSWORD
        value: Demo2024NIS2!
      # Access code clients type to unlock the demo (case-insensitive).
      - key: VITE_ACCESS_CODE
        value: SAO2026
    routes:
      # Same-origin fallback: proxy /api/* to the backend. Used only if
      # VITE_API_URL is cleared (the app then uses the relative /api/v1 path).
      - type: rewrite
        source: /api/*
        destination: https://nis2-api.onrender.com/api/:splat
      # SPA fallback — every other path serves the app shell.
      - type: rewrite
        source: /*
        destination: /index.html
